## LearnFlow Backend — 6 AI Agent Deployments (single image, configured via env vars)
## Agents: triage, concepts, codereview, debug, exercise, progress

---
# Triage Agent — routes messages to specialized agents
apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-agent
  namespace: learnflow
  labels:
    app: triage-agent
    part-of: learnflow
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triage-agent
  template:
    metadata:
      labels:
        app: triage-agent
        component: agent
    spec:
      containers:
        - name: agent
          image: us-central1-docker.pkg.dev/todo-platform-489221/learnflow-repo/learnflow-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: AGENT_NAME
              value: "triage"
            - name: SUBSCRIBE_TOPIC
              value: "learning"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: learnflow-secrets
                  key: openai-api-key
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: triage-agent
  namespace: learnflow
spec:
  selector:
    app: triage-agent
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

